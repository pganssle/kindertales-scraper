name: Build and publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-source:
    name: Validate source version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Validate source version
        id: version
        run: |
          version=$(uv run --script scripts/check_release.py)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  tag:
    name: Tag version bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate-source
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required to push the version tag
    outputs:
      created: ${{ steps.tag.outputs.created }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create version tag
        id: tag
        env:
          VERSION: ${{ needs.validate-source.outputs.version }}
        run: |
          previous_version=$(
            git show "$GITHUB_SHA^:pyproject.toml" |
              python -c 'import sys, tomllib; print(tomllib.load(sys.stdin.buffer)["project"]["version"])'
          )
          if [[ "$VERSION" == "$previous_version" ]]; then
            echo "Project version did not change"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse --verify --quiet "refs/tags/$VERSION"; then
            echo "Version tag $VERSION already exists"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git check-ref-format "refs/tags/$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "refs/tags/$VERSION"
          echo "created=true" >> "$GITHUB_OUTPUT"

  build-sdist:
    name: Build sdist
    needs: validate-source
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - name: Upload sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: distribution-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheel:
    name: Build and test wheel
    needs: validate-source
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build wheel
        run: uv build --wheel --out-dir wheelhouse

      - name: Test wheel installation
        run: |
          uv python install 3.13
          uv venv --python 3.13 .release-venv
          uv pip install --python .release-venv/bin/python wheelhouse/*.whl
          .release-venv/bin/kindertales-scraper --version

      - name: Upload wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: distribution-wheel
          path: wheelhouse/*.whl
          if-no-files-found: error

  verify-distributions:
    name: Verify distributions
    needs: [validate-source, build-sdist, build-wheel]
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: distribution-*
          path: dist
          merge-multiple: true

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Test sdist installation
        run: |
          uv python install 3.13
          uv venv --python 3.13 .release-venv
          uv pip install --python .release-venv/bin/python dist/*.tar.gz
          .release-venv/bin/kindertales-scraper --version

      - name: Check release versions
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          arguments=(--dist dist)
          if [[ -n "$RELEASE_TAG" ]]; then
            arguments+=(--tag "$RELEASE_TAG")
          fi
          uv run --script scripts/check_release.py "${arguments[@]}"

  publish:
    name: Publish to PyPI
    if: >-
      always()
      && needs.verify-distributions.result == 'success'
      && (startsWith(github.ref, 'refs/tags/') || needs.tag.outputs.created == 'true')
    needs: [tag, verify-distributions]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/kindertales-scraper
    permissions:
      id-token: write # Required for PyPI trusted publishing

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: distribution-*
          path: dist
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
